name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: priv-lab
  REGION: europe-north1
  SERVICE_NAME: stuffy
  GAR_LOCATION: europe-north1-docker.pkg.dev
  BACKUP_SCHEDULER_JOB_NAME: stuffy-daily-drive-backup
  BACKUP_SCHEDULER_LOCATION: europe-west1
  BACKUP_SCHEDULER_SCHEDULE: '17 2 * * *'
  BACKUP_SCHEDULER_TIMEZONE: Europe/Stockholm

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }} --quiet

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }} \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }} \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }} \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }} \
            --build-arg NEXT_PUBLIC_ALLOWED_EMAILS=${{ secrets.NEXT_PUBLIC_ALLOWED_EMAILS }} \
            -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/stuffy/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/stuffy/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/stuffy/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/stuffy/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/stuffy/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "FIREBASE_ADMIN_PROJECT_ID=${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}" \
            --set-env-vars "FIREBASE_ADMIN_CLIENT_EMAIL=${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}" \
            --set-env-vars "FIREBASE_ADMIN_PRIVATE_KEY=${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}" \
            --set-env-vars "GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}" \
            --set-env-vars "ALLOWED_EMAILS=${{ secrets.ALLOWED_EMAILS }}" \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "MCP_AUTH_SECRET=${{ secrets.MCP_AUTH_SECRET }}" \
            --set-env-vars "GOOGLE_DRIVE_CLIENT_ID=${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}" \
            --set-env-vars "GOOGLE_DRIVE_CLIENT_SECRET=${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}" \
            --set-env-vars "GOOGLE_DRIVE_REFRESH_TOKEN=${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }}" \
            --set-env-vars "GOOGLE_DRIVE_BACKUP_ROOT_FOLDER_ID=${{ secrets.GOOGLE_DRIVE_BACKUP_ROOT_FOLDER_ID }}" \
            --set-env-vars "GOOGLE_DRIVE_BACKUP_FOLDER_NAME=Stuffy Backups" \
            --set-env-vars "BACKUP_CRON_SECRET=${{ secrets.BACKUP_CRON_SECRET }}" \
            --set-env-vars "BACKUP_RETENTION_DAILY=7" \
            --set-env-vars "BACKUP_RETENTION_WEEKLY=8" \
            --set-env-vars "BACKUP_RETENTION_MONTHLY=12" \
            --set-env-vars "BACKUP_RETENTION_YEARLY=3" \
            --set-env-vars "BACKUP_RETENTION_TIMEZONE=${{ env.BACKUP_SCHEDULER_TIMEZONE }}" \
            --memory 512Mi \
            --cpu 1 \
            --timeout 1800 \
            --min-instances 0 \
            --max-instances 3

      - name: Resolve Cloud Run URL
        id: cloud_run_url
        run: |
          URL="$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "${URL}"

      - name: Ensure daily backup scheduler
        run: |
          BACKUP_URL="${{ steps.cloud_run_url.outputs.url }}/api/admin/backups/drive"
          HEADERS="X-Backup-Secret=${{ secrets.BACKUP_CRON_SECRET }}"

          if gcloud scheduler jobs describe "${{ env.BACKUP_SCHEDULER_JOB_NAME }}" --location "${{ env.BACKUP_SCHEDULER_LOCATION }}" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "${{ env.BACKUP_SCHEDULER_JOB_NAME }}" \
              --location "${{ env.BACKUP_SCHEDULER_LOCATION }}" \
              --schedule "${{ env.BACKUP_SCHEDULER_SCHEDULE }}" \
              --time-zone "${{ env.BACKUP_SCHEDULER_TIMEZONE }}" \
              --uri "${BACKUP_URL}" \
              --http-method POST \
              --attempt-deadline 30m \
              --headers "${HEADERS}"
          else
            gcloud scheduler jobs create http "${{ env.BACKUP_SCHEDULER_JOB_NAME }}" \
              --location "${{ env.BACKUP_SCHEDULER_LOCATION }}" \
              --schedule "${{ env.BACKUP_SCHEDULER_SCHEDULE }}" \
              --time-zone "${{ env.BACKUP_SCHEDULER_TIMEZONE }}" \
              --uri "${BACKUP_URL}" \
              --http-method POST \
              --attempt-deadline 30m \
              --headers "${HEADERS}"
          fi
